[General]
block_size = 500000      # Bytes (100 KB to 900 KB)
rle1_enabled = true
bwt_type = suffix_array  # matrix or suffix_array — SA recommended for blocks > ~50 KB
mtf_enabled = true       # Stage 2
rle2_enabled = true      # Stage 2
huffman_enabled = true   # Stage 3 (acts as entropy-coding master switch)

# Extra-credit features (§8) — must match between compress & decompress
rle1_enhanced  = true
rle1_threshold = 4       # minimum run length for encoded runs (2..255)
rle1_adaptive  = true    # store block raw if encoding would expand it
entropy_coder  = range

[Performance]
benchmark_mode = false
output_metrics = true

[Paths]
input_directory = ./benchmarks/
output_directory = ./results/
